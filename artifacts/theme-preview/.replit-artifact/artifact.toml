kind = "web"
previewPath = "/"
title = "Universal Jackets — Theme Preview"
version = "1.0.0"
id = "artifacts/theme-preview"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20716

[services.development]
run = "pnpm --filter @workspace/theme-preview run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/theme-preview", "run", "build" ]
serve = "static"
publicDir = "artifacts/theme-preview/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20716"
BASE_PATH = "/"
