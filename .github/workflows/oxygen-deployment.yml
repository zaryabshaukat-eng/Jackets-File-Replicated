name: Deploy to Oxygen

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Oxygen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Install from the workspace root so pnpm can resolve the lockfile
      # and all cross-package dependencies correctly.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build storefront
        # Run the build through the workspace filter from the root.
        # PORT and BASE_PATH are not needed during `vite build` — only the
        # dev server uses them.
        run: pnpm --filter @workspace/theme-preview run build
