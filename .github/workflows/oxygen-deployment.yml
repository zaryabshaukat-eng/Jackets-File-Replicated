name: Deploy to Oxygen

on:
  push:
    branches: [ main ]

defaults:
  run:
    # Target your specific frontend subfolder directly 🚀
    working-directory: ./artifacts/theme-preview

jobs:
  deploy:
    name: Deploy to Oxygen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        # Revert to standard local install since we are inside the correct folder
        run: pnpm install --no-frozen-lockfile

      - name: Build storefront
        # Run standard local vite build configuration
        run: pnpm run build
