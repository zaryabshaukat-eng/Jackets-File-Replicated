name: Deployment to Oxygen

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: oxygen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Oxygen
    runs-on: ubuntu-latest
    # Skip deploy on PRs from forks — they cannot access repo secrets,
    # which would cause the oxygenctl step to fail with an auth error.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Install from the workspace root — pnpm-lock.yaml lives here,
      # not inside the subfolder.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the Vite SPA — outputs to artifacts/theme-preview/dist/public
      - name: Build storefront
        run: pnpm --filter @workspace/theme-preview run build

      # Oxygen is a server-side (Cloudflare Workers) platform and requires a
      # worker entry file. This minimal worker serves the Vite SPA: static
      # assets are served from Oxygen's CDN binding; all other routes fall back
      # to index.html so client-side routing works correctly.
      - name: Create Oxygen SPA worker
        run: |
          mkdir -p artifacts/theme-preview/dist/worker
          cat > artifacts/theme-preview/dist/worker/index.js << 'WORKEREOF'
          export default {
            async fetch(request, env) {
              const url = new URL(request.url);
              // Serve static assets (JS, CSS, images, fonts…)
              const staticRes = await env.assets.fetch(request).catch(() => null);
              if (staticRes && staticRes.status !== 404) return staticRes;
              // All other routes → index.html (enables client-side routing)
              return env.assets.fetch(
                new Request(new URL('/index.html', url.origin), {
                  headers: request.headers,
                })
              );
            },
          };
          WORKEREOF

      # Deploy: tell Oxygen where the worker and the client assets are separately.
      - name: Deploy to Oxygen
        uses: shopify/oxygenctl-action@v4
        with:
          oxygen_deployment_token: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN_1000155601 }}
          oxygen_worker_dir: "./artifacts/theme-preview/dist/worker"
          oxygen_client_dir: "./artifacts/theme-preview/dist/public"
