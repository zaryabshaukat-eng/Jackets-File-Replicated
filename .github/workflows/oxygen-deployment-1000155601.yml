name: Deployment to Oxygen

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: oxygen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Oxygen
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build storefront
        run: pnpm --filter @workspace/theme-preview run build

      - name: Assemble Oxygen dist layout
        working-directory: artifacts/theme-preview
        run: |
          mv dist/public dist/client

          mkdir -p dist/worker
          cat > dist/worker/index.js << 'WORKEREOF'
          export default {
            async fetch(request, env) {
              const url = new URL(request.url);
              const staticRes = await env.assets.fetch(request).catch(() => null);
              if (staticRes && staticRes.status !== 404) return staticRes;
              return env.assets.fetch(
                new Request(new URL('/index.html', url.origin), {
                  headers: request.headers,
                })
              );
            },
          };
          WORKEREOF

      - name: Verify dist layout
        working-directory: artifacts/theme-preview
        run: |
          test -f dist/worker/index.js   || { echo "ERROR: dist/worker/index.js not found"; exit 1; }
          test -d dist/client            || { echo "ERROR: dist/client/ not found"; exit 1; }
          test -f dist/client/index.html || { echo "ERROR: dist/client/index.html not found"; exit 1; }
          echo "dist layout OK:"
          echo "  worker/index.js: $(wc -c < dist/worker/index.js) bytes"
          echo "  client/: $(find dist/client -type f | wc -l) files"

      - name: Deploy to Oxygen
        uses: shopify/oxygenctl-action@v4
        with:
          path: "./artifacts/theme-preview"
          build_command: "echo 'pre-built'"
          oxygen_deployment_token: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN_1000155601 }}
          oxygen_worker_dir: "dist/worker"
          oxygen_client_dir: "dist/client"
