name: Deployment to Oxygen

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: oxygen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Oxygen
    runs-on: ubuntu-latest
    # Skip deploy on PRs from forks — they cannot access repo secrets,
    # which would cause the oxygenctl step to fail with an auth error.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Install from the workspace root — pnpm-lock.yaml lives here,
      # not inside the subfolder.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build explicitly as a separate step so failures are visible.
      # PORT and BASE_PATH are only needed by the dev server, not the build.
      - name: Build storefront
        run: pnpm --filter @workspace/theme-preview run build

      # Deploy the pre-built output to Oxygen.
      # build_command is intentionally omitted — the build already ran above.
      - name: Deploy to Oxygen
        uses: shopify/oxygenctl-action@v4
        with:
          oxygen_deployment_token: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN_1000155601 }}
          path: "./artifacts/theme-preview/dist/public"
